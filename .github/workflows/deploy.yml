name: Deploy

# Backport of the versioned-deploy workflow onto the v0.1.0 (pre-versioning)
# code so this release can be frozen at /studio/v0.1.0/ for rollback. Only the
# build/deploy CONFIG differs from the original v0.1.0 deploy.yml — the app code
# is unchanged. The firmware-download step is kept verbatim so the frozen build
# serves the same firmware library as the live /studio/ did.
#
# Deploy targets:
#   - push to master / firmware-released  → /studio/         (latest)
#   - push tag v*                         → /studio/v<X.Y.Z>/ (immutable release)
#                                         + /studio/versions.json (version list)

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  repository_dispatch:
    types: [firmware-released]

# Opt into Node.js 24 now (Node 20 deprecation starts 2026-06-02).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    name: Build and FTP Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # versions.json は全リリースタグから生成するので tag 履歴が要る。
          fetch-depth: 0

      # Decide base path / version / FTP target from the git ref.
      - name: Determine deploy target
        id: target
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
            echo "is_release=true"            >> "$GITHUB_OUTPUT"
            echo "base=/studio/${tag}/"        >> "$GITHUB_OUTPUT"
            echo "ftp_dir=/studio/${tag}/"     >> "$GITHUB_OUTPUT"
            echo "version=${tag#v}"            >> "$GITHUB_OUTPUT"
            echo "Release build: ${tag} -> /studio/${tag}/"
          else
            echo "is_release=false"            >> "$GITHUB_OUTPUT"
            echo "base=/studio/"               >> "$GITHUB_OUTPUT"
            echo "ftp_dir=/studio/"            >> "$GITHUB_OUTPUT"
            echo "version="                    >> "$GITHUB_OUTPUT"
            echo "Dev build: master -> /studio/"
          fi

      - name: Download firmware artifacts
        run: |
          gh release download \
            --repo Hapbeat/hapbeat-device-firmware \
            --dir public/firmware \
            --pattern "*.bin" \
            --pattern "manifest.json" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.FIRMWARE_REPO_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install deps (ci)
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # vite.config.ts が参照: base path とアプリ表示バージョンを ref から渡す。
          STUDIO_BASE: ${{ steps.target.outputs.base }}
          VITE_APP_VERSION: ${{ steps.target.outputs.version }}

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: ${{ steps.target.outputs.ftp_dir }}
          local-dir: ./dist/

      # リリース時のみ: 全タグから versions.json を生成し、/studio/ 直下へ
      # 単一ファイルとして上書きアップロード (curl FTPS、他ファイルは消さない)。
      - name: Publish versions.json (release only)
        if: steps.target.outputs.is_release == 'true'
        run: |
          node scripts/gen-versions-json.mjs out/versions.json
          cat out/versions.json
          curl -sS -k --ftp-ssl --ssl-reqd \
            --user "${FTP_USER}:${FTP_PASS}" \
            -T out/versions.json \
            "ftp://${FTP_HOST}/studio/versions.json"
        env:
          FTP_HOST: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
