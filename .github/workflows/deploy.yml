name: Deploy

# Deploy targets:
#   - push to master / firmware-released  → /studio/      (最新・開発プレビュー)
#   - push tag vX.Y.Z                     → /studio/v<X.Y>/  (マイナー単位の凍結リリース)
#                                         + /studio/versions.json (版一覧を更新)
#   - workflow_dispatch (tag=vX.Y.Z)      → 指定タグを /studio/v<X.Y>/ へ再デプロイ
#
# 凍結ディレクトリは「マイナー単位」(/studio/v0.2/ など)。パッチ (v0.2.1) は同じ
# マイナー dir を上書きするので、パッチごとに dir が増えない。バッジには フル版
# (0.2.1) を表示する (vite.config の VITE_APP_VERSION)。新マイナーで不具合が出ても、
# ユーザーは旧マイナーの固定 URL / アプリ内の版切替で前のマイナー線に戻れる
# (ロールバック粒度 = マイナー)。
on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '再デプロイする既存リリースタグ (例: v0.1.0)。/studio/v<X.Y>/ へ出す。通常運用では空のまま。'
        required: false
        default: ''
  repository_dispatch:
    types: [firmware-released]

# Opt into Node.js 24 now (Node 20 deprecation starts 2026-06-02).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    name: Build and FTP Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # versions.json は全リリースタグから生成するので tag 履歴が要る。
          fetch-depth: 0
          # workflow_dispatch で tag を指定した場合はそのタグを checkout して
          # 再デプロイする (例: v0.1.0 を新スキームの /studio/v0.1/ へ)。
          # 通常 (push) は github.ref をそのまま使う。
          ref: ${{ github.event.inputs.tag || github.ref }}

      # Decide base path / version / FTP target from the git ref.
      #
      # Effective tag = workflow_dispatch input (re-deploy) OR a pushed v* tag.
      # A release deploys to a MINOR-versioned dir (/studio/vX.Y/): patches
      # overwrite the same dir, so there is no per-patch subdir bloat. The app
      # still self-reports the full patch version (VITE_APP_VERSION=X.Y.Z).
      # master (no tag) → /studio/ (latest, mutable preview), version empty so
      # vite.config falls back to package.json.
      - name: Determine deploy target
        id: target
        run: |
          DISPATCH_TAG="${{ github.event.inputs.tag }}"
          if [[ -n "$DISPATCH_TAG" ]]; then
            eff_tag="$DISPATCH_TAG"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            eff_tag="${GITHUB_REF#refs/tags/}"
          else
            eff_tag=""
          fi

          if [[ -n "$eff_tag" ]]; then
            # Release tags must be strict semver vX.Y.Z (the contract). Reject
            # malformed tags loudly instead of FTP-uploading the app to a junk
            # dir (e.g. v0.2 → /studio/v0/, vbeta → /studio/vbeta/) that
            # gen-versions-json.mjs (strict /^v\d+\.\d+\.\d+$/) would then omit
            # from versions.json, stranding an unreachable orphan build.
            if [[ ! "$eff_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::release tag '$eff_tag' is not strict semver vX.Y.Z — refusing to deploy."
              exit 1
            fi
            version="${eff_tag#v}"            # e.g. 0.2.1
            minor="${version%.*}"             # e.g. 0.2  (strip the patch)
            echo "is_release=true"               >> "$GITHUB_OUTPUT"
            echo "base=/studio/v${minor}/"       >> "$GITHUB_OUTPUT"
            echo "ftp_dir=/studio/v${minor}/"    >> "$GITHUB_OUTPUT"
            echo "version=${version}"            >> "$GITHUB_OUTPUT"
            echo "Release ${eff_tag} → /studio/v${minor}/ (minor dir, full version ${version})"
          else
            echo "is_release=false"           >> "$GITHUB_OUTPUT"
            echo "base=/studio/"              >> "$GITHUB_OUTPUT"
            echo "ftp_dir=/studio/"           >> "$GITHUB_OUTPUT"
            echo "version="                   >> "$GITHUB_OUTPUT"
            echo "Dev build: master → /studio/"
          fi

      # Download the latest + archive releases (newest 6) from EVERY firmware
      # repo so Studio can offer older firmware versions for rollback
      # (firmware-distribution.md, DEC-034). Each release lands in
      # fw-staging/<repo>/<tag>/; aggregate-firmware-manifest.mjs merges them
      # into one manifest.json with per-variant versions[]. Peripheral firmware
      # (ESP-NOW transmitter) lives in its own repo — without it, the Studio
      # firmware library only ever shows hapbeat-device-firmware (receiver /
      # broker / sensor) and never the 周辺機器 transmitter.
      - name: Download firmware releases (latest + archive)
        run: |
          # A repo with no releases yet (e.g. transmitter before its first tag)
          # is warned + skipped so the deploy never breaks on it.
          for repo_name in hapbeat-device-firmware hapbeat-transmitter-firmware; do
            repo="Hapbeat/$repo_name"
            mkdir -p "fw-staging/$repo_name"
            tags=$(gh release list --repo "$repo" --limit 6 --json tagName --jq '.[].tagName' || true)
            if [ -z "$tags" ]; then
              echo "::warning::no releases found for $repo — skipping (no firmware aggregated for it)"
              continue
            fi
            for t in $tags; do
              echo "downloading $repo_name $t"
              mkdir -p "fw-staging/$repo_name/$t"
              gh release download "$t" \
                --repo "$repo" \
                --dir "fw-staging/$repo_name/$t" \
                --pattern "*.bin" \
                --pattern "manifest.json" \
                --pattern "manifest.fragment.json" \
                --clobber
            done
          done
        env:
          # NOTE: this PAT must have read access to BOTH firmware repos.
          GH_TOKEN: ${{ secrets.FIRMWARE_REPO_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install deps (ci)
        run: npm ci

      # workflow_dispatch の旧タグ再デプロイでは、その checkout に master 由来の
      # スクリプトが無いことがある (例: v0.1.0 には aggregate-firmware-manifest.mjs が
      # 存在しない)。その場合は skip して再デプロイを成立させる (古い版は firmware
      # ライブラリ機能自体が無いので manifest 不要)。
      - name: Aggregate firmware manifest (versions/archive)
        run: |
          if [ -f scripts/aggregate-firmware-manifest.mjs ]; then
            node scripts/aggregate-firmware-manifest.mjs fw-staging public/firmware
          else
            echo "::notice::aggregate-firmware-manifest.mjs absent in this checkout — skipping (old-tag re-deploy)"
          fi

      - name: Build
        run: npm run build
        env:
          # vite.config.ts が参照: base path とアプリ表示バージョンを ref から渡す。
          STUDIO_BASE: ${{ steps.target.outputs.base }}
          VITE_APP_VERSION: ${{ steps.target.outputs.version }}

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: ${{ steps.target.outputs.ftp_dir }}
          local-dir: ./dist/

      # タグ push 時のみ: 全タグから versions.json を生成し、/studio/ 直下へ
      # 単一ファイルとして上書きアップロード (curl FTPS、他ファイルは消さない)。
      # アプリ内の VersionSwitcher がこれを読んで版切替の選択肢を出す。
      #
      # ⚠ deploy と manifest の結合に注意: ここで publish される versions.json は、
      # 既存の全マイナー線について /studio/v<X.Y>/ への切替リンクを載せる。新スキーム
      # 移行後、各マイナー dir は「そのマイナーの最新パッチを一度この新スキームで
      # デプロイ済み」であることが前提。まだ /studio/v<X.Y>/ を作っていない旧マイナー
      # (例: 移行直後の v0.1) があると、その切替リンクが 404 になる。新マイナーの
      # 初回タグ push はその run 自身が自分の dir を作るので安全だが、過去マイナーは
      # 事前に workflow_dispatch(tag=旧タグ) で /studio/v<X.Y>/ を作っておくこと。
      #
      # workflow_dispatch の再デプロイ (古いタグを checkout) では本ステップを除外する:
      # その checkout は古い gen-versions-json.mjs を含むため、ここで実行すると最新
      # タグ push が生成した正しい versions.json を旧ロジックで上書きしてしまう。
      # 再デプロイは /studio/v<X.Y>/ のアプリ本体だけ作り直せばよい。
      - name: Publish versions.json (tag push only)
        if: steps.target.outputs.is_release == 'true' && github.event_name != 'workflow_dispatch'
        run: |
          node scripts/gen-versions-json.mjs out/versions.json
          cat out/versions.json
          curl -sS -k --ftp-ssl --ssl-reqd \
            --user "${FTP_USER}:${FTP_PASS}" \
            -T out/versions.json \
            "ftp://${FTP_HOST}/studio/versions.json"
        env:
          FTP_HOST: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
