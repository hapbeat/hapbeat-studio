name: Deploy

on:
  push:
    branches:
      - master
  repository_dispatch:
    types: [firmware-released]

# Opt into Node.js 24 now (Node 20 deprecation starts 2026-06-02).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    name: Build and FTP Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download firmware artifacts
        run: |
          gh release download \
            --repo Hapbeat/hapbeat-device-firmware \
            --dir public/firmware \
            --pattern "*.bin" \
            --pattern "manifest.json" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.FIRMWARE_REPO_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install deps (ci)
        run: npm ci

      - name: Build
        run: npm run build

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: /studio/
          local-dir: ./dist/
