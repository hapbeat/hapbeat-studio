name: Deploy

# Deploy targets:
#   - push to master / firmware-released  → /studio/        (最新・開発プレビュー)
#   - push tag v*                         → /studio/v<X.Y.Z>/  (不変リリース)
#                                         + /studio/versions.json (版一覧を更新)
# 旧リリースは /studio/v<X.Y.Z>/ に永続的に残るので、新版に不具合が出ても
# ユーザーは固定 URL / アプリ内の版切替で旧版に戻れる (ロールバック)。
on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  repository_dispatch:
    types: [firmware-released]

# Opt into Node.js 24 now (Node 20 deprecation starts 2026-06-02).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    name: Build and FTP Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # versions.json は全リリースタグから生成するので tag 履歴が要る。
          fetch-depth: 0

      # Decide base path / version / FTP target from the git ref.
      - name: Determine deploy target
        id: target
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
            version="${tag#v}"
            echo "is_release=true"           >> "$GITHUB_OUTPUT"
            echo "base=/studio/${tag}/"       >> "$GITHUB_OUTPUT"
            echo "ftp_dir=/studio/${tag}/"    >> "$GITHUB_OUTPUT"
            echo "version=${version}"         >> "$GITHUB_OUTPUT"
            echo "Release build: ${tag} → /studio/${tag}/"
          else
            echo "is_release=false"           >> "$GITHUB_OUTPUT"
            echo "base=/studio/"              >> "$GITHUB_OUTPUT"
            echo "ftp_dir=/studio/"           >> "$GITHUB_OUTPUT"
            echo "version="                   >> "$GITHUB_OUTPUT"
            echo "Dev build: master → /studio/"
          fi

      # Download the latest + archive releases (newest 6) so Studio can offer
      # older firmware versions for rollback (firmware-distribution.md,
      # DEC-034). Each release lands in its own tag subdir; the aggregation
      # script merges them into one manifest.json with per-variant versions[].
      - name: Download firmware releases (latest + archive)
        run: |
          repo="Hapbeat/hapbeat-device-firmware"
          mkdir -p fw-staging/hapbeat-device-firmware
          tags=$(gh release list --repo "$repo" --limit 6 --json tagName --jq '.[].tagName')
          for t in $tags; do
            echo "downloading $t"
            mkdir -p "fw-staging/hapbeat-device-firmware/$t"
            gh release download "$t" \
              --repo "$repo" \
              --dir "fw-staging/hapbeat-device-firmware/$t" \
              --pattern "*.bin" \
              --pattern "manifest.json" \
              --pattern "manifest.fragment.json" \
              --clobber
          done
        env:
          GH_TOKEN: ${{ secrets.FIRMWARE_REPO_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install deps (ci)
        run: npm ci

      - name: Aggregate firmware manifest (versions/archive)
        run: node scripts/aggregate-firmware-manifest.mjs fw-staging public/firmware

      - name: Build
        run: npm run build
        env:
          # vite.config.ts が参照: base path とアプリ表示バージョンを ref から渡す。
          STUDIO_BASE: ${{ steps.target.outputs.base }}
          VITE_APP_VERSION: ${{ steps.target.outputs.version }}

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: ${{ steps.target.outputs.ftp_dir }}
          local-dir: ./dist/

      # リリース時のみ: 全タグから versions.json を生成し、/studio/ 直下へ
      # 単一ファイルとして上書きアップロード (curl FTPS、他ファイルは消さない)。
      # アプリ内の VersionSwitcher がこれを読んで版切替の選択肢を出す。
      - name: Publish versions.json (release only)
        if: steps.target.outputs.is_release == 'true'
        run: |
          node scripts/gen-versions-json.mjs out/versions.json
          cat out/versions.json
          curl -sS -k --ftp-ssl --ssl-reqd \
            --user "${FTP_USER}:${FTP_PASS}" \
            -T out/versions.json \
            "ftp://${FTP_HOST}/studio/versions.json"
        env:
          FTP_HOST: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
